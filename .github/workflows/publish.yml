name: Publish to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "topics/**"
      - "styles/**"
      - "*.qmd"
      - "*.yml"
      - "glossary.json"

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Sync glossary
        run: bash code/scripts/sync_glossary.sh

      - name: Render site
        run: quarto render .

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
